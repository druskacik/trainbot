<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrainBot - Travel with night trains in Europe</title>
    <!-- Syne (display) + Plus Jakarta Sans (UI) — distinctive, grounded, precise -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Syne:wght@500;600;700&display=swap" rel="stylesheet">

    <!-- Static files -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'ui/style.css' %}">

    <!-- Umami Tracking -->
    <script defer src="https://umami.cr.bswatcher.com/script.js"
        data-website-id="aad2c1ad-5911-4278-9067-593ba9a76e87"></script>
</head>

<body>
    <header class="main-header">
        <div class="logo">
            <span class="logo-icon" aria-hidden="true">
                <svg width="28" height="20" viewBox="0 0 28 20" fill="none" xmlns="http://www.w3.org/2000/svg" focusable="false" aria-hidden="true">
                    <path d="M2 10h24M2 6h24M2 14h24" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </span>
            <h1>TrainBot</h1>
        </div>
        <p class="subtitle">Find the lowest fares for night trains in Europe</p>
    </header>

    <main class="container">
        <section class="search-section">
            <form id="search-form" class="glass-panel">
                <div id="form-error" class="form-error" hidden role="alert"></div>
                <div class="row-group">
                    <div class="form-group">
                        <label for="start-station">From</label>
                        <div class="combobox-wrapper">
                            <input type="hidden" name="start_id" value="">
                            <input type="text" id="start-station" class="combobox-input"
                                role="combobox" aria-expanded="false" aria-autocomplete="list"
                                aria-controls="start-station-listbox" aria-activedescendant=""
                                autocomplete="off" placeholder="Loading cities...">
                            <ul id="start-station-listbox" class="combobox-listbox" role="listbox"
                                aria-label="Departure cities" hidden></ul>
                            <span class="combobox-live" aria-live="polite" aria-atomic="true"></span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="end-station">To</label>
                        <div class="combobox-wrapper">
                            <input type="hidden" name="end_id" value="">
                            <input type="text" id="end-station" class="combobox-input"
                                role="combobox" aria-expanded="false" aria-autocomplete="list"
                                aria-controls="end-station-listbox" aria-activedescendant=""
                                autocomplete="off" placeholder="Loading cities...">
                            <ul id="end-station-listbox" class="combobox-listbox" role="listbox"
                                aria-label="Destination cities" hidden></ul>
                            <span class="combobox-live" aria-live="polite" aria-atomic="true"></span>
                        </div>
                    </div>
                </div>

                <fieldset class="form-group" aria-labelledby="journey-type-legend">
                    <legend id="journey-type-legend" class="fieldset-legend">Journey Type</legend>
                    <div class="radio-group">
                        <input type="radio" id="type-single" name="type" value="single" checked>
                        <label for="type-single" class="radio-label">Single</label>

                        <input type="radio" id="type-return" name="type" value="return">
                        <label for="type-return" class="radio-label">Return</label>
                    </div>
                </fieldset>

                <div class="form-group return-params" id="return-params-group">
                    <label for="max-duration">Max Trip Duration (Days)</label>
                    <input type="number" id="max-duration" name="max_duration" value="14" min="1" max="90"
                        class="num-input">
                    <div class="helper-text">Find the lowest return prices within this timeframe</div>
                </div>

                <fieldset class="form-group" aria-labelledby="seat-type-legend">
                    <legend id="seat-type-legend" class="fieldset-legend">Seat Type</legend>
                    <div class="radio-group">
                        <input type="radio" id="seat-any" name="seat_type" value="any" checked>
                        <label for="seat-any" class="radio-label">Any (Cheapest)</label>

                        <input type="radio" id="seat-couchette" name="seat_type" value="couchette">
                        <label for="seat-couchette" class="radio-label">Sleeping</label>
                    </div>
                </fieldset>

                <button type="submit" class="primary-btn" id="search-btn">
                    <span class="btn-text">Search Lowest Fares</span>
                    <span class="btn-loader hidden"></span>
                </button>
            </form>
        </section>

        <section class="results-section">
            <div id="results-container" class="results-grid" aria-live="polite" aria-atomic="true" aria-busy="false">
                <!-- Results populated by JS -->
            </div>

            <div id="empty-state" class="empty-state">
                <div class="empty-icon" aria-hidden="true"></div>
                <p>Select your cities and run a search.</p>
            </div>

            <div id="no-results-state" class="empty-state hidden">
                <div class="empty-icon" aria-hidden="true"></div>
                <p>No trips found for these criteria.</p>
            </div>
        </section>
    </main>

    <script src="{% static 'ui/script.js' %}"></script>

    <footer class="site-footer">
        <a href="/about/" class="footer-link">About TrainBot</a>
    </footer>
</body>

</html>
